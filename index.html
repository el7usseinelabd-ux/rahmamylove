<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مملكة رحمة الأبدية ❤️</title>
    <style>
        body { 
            background: #070312; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
            line-height: 1.6;
        }
        .container { max-width: 500px; margin: auto; }
        h1 { color: #ff2a6d; margin-bottom: 10px; }
        
        /* ضبط الصور لتكون تحت بعضها وبشكل جميل */
        .photo-gallery { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            margin: 30px 0; 
        }
        .photo-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #333;
        }
        img { 
            width: 100%; 
            border-radius: 15px; 
            display: block;
        }
        
        .btn { 
            background: #ff2a6d; 
            color: white; 
            border: none; 
            padding: 15px 25px; 
            border-radius: 30px; 
            cursor: pointer; 
            font-size: 1rem; 
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn:hover { background: #d6245f; }
        #audio-status { margin-top: 15px; color: #ffd700; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>رحمة.. يا كل الحياة ❤️</h1>
    <p>أجمل أقداري، وأعظم نعم حياتي.</p>

    <div class="photo-gallery">
        <!-- الصور الآن ستظهر تحت بعضها -->
        <div class="photo-card">
            <img src="https://raw.githubusercontent.com/el7usseinelabd-ux/rahmamylove/main/WhatsApp_Image_2026-07-14_at_12.46.05_PM%5B1%5D.jpeg" alt="صورة 1">
        </div>
        <div class="photo-card">
            <img src="https://raw.githubusercontent.com/el7usseinelabd-ux/rahmamylove/main/WhatsApp_Image_2026-07-14_at_12.46.05_PM_%281%29%5B1%5D.jpeg" alt="صورة 2">
        </div>
        <div class="photo-card">
            <img src="https://raw.githubusercontent.com/el7usseinelabd-ux/rahmamylove/main/WhatsApp_Image_2026-07-14_at_12.46.05_PM_%282%29%5B1%5D.jpeg" alt="صورة 3">
        </div>
    </div>

    <audio id="myAudio" style="display:none;"></audio>
    <p id="audio-status">جاري تحضير معزوفة خاصة لكِ...</p>
    <button class="btn" onclick="playMusic()">اضغطي لتشغيل الموسيقى 🎶</button>
</div>

<script>
    const songs = [
        "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
        "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
        "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
    ];

    const audioPlayer = document.getElementById("myAudio");
    const statusText = document.getElementById("audio-status");
    
    // اختيار أغنية عشوائية عند فتح الصفحة
    window.onload = function() {
        const randomSong = songs[Math.floor(Math.random() * songs.length)];
        audioPlayer.src = randomSong;
    };

    function playMusic() {
        if (audioPlayer.paused) {
            audioPlayer.play();
            statusText.innerText = "تستمعين الآن إلى نغمة اخترتها لقلبكِ.. ❤️";
        } else {
            audioPlayer.pause();
            statusText.innerText = "توقفت الموسيقى..";
        }
    }
</script>

</body>
</html>
