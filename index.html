<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مملكة رحمة الأبدية ❤️</title>
    <style>
        :root { --primary: #ff2a6d; --dark: #070312; --soft-pink: rgba(255, 42, 109, 0.2); }
        body { background: var(--dark); color: #fff; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* تأثير القلوب */
        .heart-fall { position: fixed; top: -10px; color: var(--primary); font-size: 20px; animation: fall linear forwards; z-index: 1; pointer-events: none; }
        @keyframes fall { to { transform: translateY(100vh); opacity: 0; } }

        /* شاشة الدخول */
        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #2d0b1a 0%, #070312 100%); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); padding: 30px; border-radius: 30px; border: 1px solid var(--primary); text-align: center; width: 85%; max-width: 300px; }
        input { padding: 12px; border-radius: 20px; border: 1px solid var(--primary); width: 80%; text-align: center; background: transparent; color: #fff; margin-bottom: 20px; }
        button { background: var(--primary); color: white; border: none; padding: 10px 30px; border-radius: 20px; cursor: pointer; }

        /* المحتوى */
        .content { display: none; padding: 20px; max-width: 400px; margin: auto; text-align: center; position: relative; z-index: 2; }
        
        /* بطاقة الاسم العلوية */
        .name-banner { background: var(--soft-pink); border: 1px solid var(--primary); padding: 15px; border-radius: 20px; margin-bottom: 30px; backdrop-filter: blur(5px); }
        .name-banner h1 { margin: 0; color: #fff; font-size: 1.8rem; }

        /* تنسيق الصور */
        .gallery-img { width: 100%; max-width: 250px; border-radius: 15px; border: 3px solid var(--primary); margin: 10px auto; display: block; box-shadow: 0 5px 15px rgba(255,42,109,0.2); }
        
        .quote { font-size: 1.1rem; margin: 20px 0; color: #ffb8c6; line-height: 1.6; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="login-box">
        <h2 style="color:var(--primary)">مرحباً يا ملكة ❤️</h2>
        <input type="password" id="pass" placeholder="كلمة السر..">
        <button onclick="checkPass()">دخول</button>
    </div>
</div>

<div class="content" id="main-content">
    <div class="name-banner">
        <h1>رحمة.. ❤️</h1>
        <p style="font-size: 0.9rem; margin-top:5px;">أميرة قلبي وكل ما أملك</p>
    </div>

    <p class="quote">"لا يوجد في العالم ما هو أجمل من وجودكِ في حياتي، أنتِ السعادة التي كنت أبحث عنها."</p>
    
    <img class="gallery-img" src="https://raw.githubusercontent.com/el7usseinelabd-ux/rahmamylove/main/WhatsApp_Image_2026-07-14_at_12.46.05_PM%5B1%5D.jpeg">
    <img class="gallery-img" src="https://raw.githubusercontent.com/el7usseinelabd-ux/rahmamylove/main/WhatsApp_Image_2026-07-14_at_12.46.05_PM_%281%29%5B1%5D.jpeg">
    <img class="gallery-img" src="https://raw.githubusercontent.com/el7usseinelabd-ux/rahmamylove/main/WhatsApp_Image_2026-07-14_at_12.46.05_PM_%282%29%5B1%5D.jpeg">
    
    <div class="quote" style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px;">
        "أحبكِ في كل ثانية، ومعكِ أشعر أن الدنيا بأكملها في يدي."
    </div>
</div>

<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<script>
    function createHeart() {
        const heart = document.createElement("div");
        heart.innerHTML = "❤️";
        heart.className = "heart-fall";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = Math.random() * 3 + 3 + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
    }

    function checkPass() {
        if (document.getElementById("pass").value.toLowerCase() === "love") {
            document.getElementById("music").play();
            document.getElementById("lock-screen").style.display = "none";
            document.getElementById("main-content").style.display = "block";
            setInterval(createHeart, 800);
        } else {
            alert("حاولي مرة أخرى يا أميرتي.. السر كلمة love ❤️");
        }
    }
</script>

</body>
</html>
